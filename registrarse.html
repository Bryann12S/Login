<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    
    <form onsubmit="validateForm(event);" class="form-login">
        <h1>Registro de Usuario</h1>
        <div class="campo">
            <label for="nuevo-usuario">Nuevo Usuario</label>
            <input type="text" id="nuevo-usuario" name="nuevo-usuario" required>
        </div>
        <div class="campo">
            <label for="nueva-contrasena">Nueva Contraseña</label>
            <input type="password" id="nueva-contrasena" name="nueva-contrasena" required>
        </div>
        <div class="campo-button">
            <input type="submit" value="Registrarse">
            <p>¿Ya tienes una cuenta?</p>
            <a href="login.html">Ingresa en tu cuenta</a>
        </div>
    </form>

</body>
</html>
